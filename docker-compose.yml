services:
  rahal.api:
    image: ${DOCKER_REGISTRY-}rahalapi
    build:
      context: .
      dockerfile: Rahal.Api/Dockerfile
    environment:
     - DATABASE_HOST=postgres-container
     - DATABASE_PORT=5432
     - DATABASE_NAME=Rahal
     - DATABASE_USERNAME=postgres
     - DATABASE_PASSWORD=admin
     - REDIS_HOST=redis
     - REDIS_PORT=6379 
     - MEILI_HOST=meilisearch
     - MEILI_PORT=7700 
     - MEILI_API_KEY=masterKey123 
     - JWT_SECRET=YourSuperSecretKeyThatIsAtLeast32CharactersLongForHmacSha256
     - ASPNETCORE_ENVIRONMENT=Development

    ports:
     - "7145:8080"
    networks:
     - rahal-network
    depends_on:
     - postgres-container

  postgres-container:
   image: postgres:13
   environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=admin
    - POSTGRES_DB=Rahal
   ports:
    - "5432:5432"
   networks:
    - rahal-network

  redis:
   image: redis:8
   ports:
    - "6379:6379"
   networks:
    - rahal-network

  meilisearch:
   image: getmeili/meilisearch:v1.41.0
   ports:
    - "7700:7700"
   networks:
    - rahal-network
   environment:
    - MEILI_MASTER_KEY=masterKey123
   volumes:
    - meilisearch_data:/meili_data

networks:
 rahal-network:
  driver: bridge

volumes:
  meilisearch_data: